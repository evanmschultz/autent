name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  check:
    name: check (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install repo tooling
        shell: bash
        run: |
          go install github.com/magefile/mage@v1.17.0
          go install mvdan.cc/gofumpt@v0.9.2
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run smoke gate
        shell: bash
        run: mage check

  check-macos:
    name: check (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install repo tooling
        shell: bash
        run: |
          go install github.com/magefile/mage@v1.17.0
          go install mvdan.cc/gofumpt@v0.9.2
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run macOS compatibility gate
        shell: bash
        run: mage check

  check-windows:
    name: check (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Normalize checkout line endings
        shell: bash
        run: |
          git config --global core.autocrlf false
          git reset --hard HEAD
      - name: Install repo tooling
        shell: bash
        run: |
          go install github.com/magefile/mage@v1.17.0
          go install mvdan.cc/gofumpt@v0.9.2
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run Windows compatibility gate
        shell: bash
        run: mage check

  full-gate:
    name: full gate (ubuntu-latest)
    runs-on: ubuntu-latest
    needs:
      - check
      - check-macos
      - check-windows
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install repo tooling
        shell: bash
        run: |
          go install github.com/magefile/mage@v1.17.0
          go install mvdan.cc/gofumpt@v0.9.2
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          go install github.com/goreleaser/goreleaser/v2@v2.14.3
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run canonical CI gate
        shell: bash
        run: mage ci
